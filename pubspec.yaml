name: expense
description: "A personal expense tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  flutter_bloc: ^9.1.0
  fpdart: ^1.2.0
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.2
  get_it: ^9.2.1
  flutter_native_splash: ^2.4.6
  fl_chart: ^0.68.0
  pdf: ^3.10.7
  path_provider: ^2.1.2
  share_plus: ^12.0.1
  open_filex: ^4.3.4
  google_fonts: ^6.2.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

# ── Splash Screen Config ──
flutter_native_splash:
  color: "#0A0E21"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#0A0E21"

# ── Launcher Icon Config ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splash_logo.png"

# ── Flutter Config ──
flutter:
  uses-material-design: true

  assets:
    - assets/images/financial_insights.png
    - assets/images/set_budget.png
    - assets/images/track_expenses.png
    - assets/images/splash_logo.png